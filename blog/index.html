---
layout: page
title: Research Blog
permalink: /blog/
---

<h1>Research Blog</h1>

{% for post in site.posts %}
  <div class="post-item">

    <h2>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h2>

    {% if post.description %}
      <p>{{ post.description }}</p>
    {% endif %}

    <p style="color:#666;">
      {{ post.date | date: "%B %-d, %Y" }}
    </p>

  </div>

  <hr>
{% endfor %}
